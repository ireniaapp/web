<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irenia | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-white italic uppercase text-center">IRE<span class="text-blue-500">NIA</span></h1>
            <h2 class="text-lg text-slate-400 mt-2">Crea tu cuenta médica</h2>
        </div>
        <form id="register-form" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required class="w-full p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-white outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="Contraseña" required class="w-full p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-white outline-none focus:border-blue-500">
            <button type="submit" class="w-full bg-blue-600 py-4 rounded-2xl text-white font-bold transition-all hover:bg-blue-500">Comenzar ahora</button>
        </form>
        <p class="text-slate-500 text-sm text-center mt-6 italic">¿Ya tienes cuenta? <a href="login.html" class="text-blue-400 font-bold hover:underline">Inicia sesión</a></p>
    </div>
    <script src="auth.js"></script>
</body>
</html>
